    <style>
      /* Hide Google Maps billing error dialog */
      .gm-err-container, .gm-style-mot, .dismissButton,
      .gm-err-autocomplete, .gm-err-title, .gm-err-message { display: none !important; }
      .gm-style iframe + div { display: none !important; }
      /* Google Maps injects a modal with inline styles — target it via parent */
      .gm-style > div > div[style*="z-index"] > div[role="dialog"] { display: none !important; }
    </style>
