name: DroneMedic CI

on:
  push:
    branches: [main, "zain/**", "karim/**", "hakimi/**", "haseeb/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install core dependencies
        run: |
          pip install numpy
          pip install fastapi uvicorn pydantic python-dotenv requests ortools tenacity supabase openai anthropic
          pip install pandas openpyxl
      - name: Check imports
        run: |
          PYTHONPATH=. python -c "from backend.domain.models import Mission, Delivery, Drone"
          PYTHONPATH=. python -c "from ai.schemas import ParsedDeliveryTask, FlightDecisionOutput"
          PYTHONPATH=. python -c "from ai.demand_forecast import DemandForecaster"
          PYTHONPATH=. python -c "from ai.local_model import LocalParser"
          PYTHONPATH=. python -c "from backend.utils.resilience import with_retry, CircuitBreaker"
      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests/test_api.py -v --tb=short
        continue-on-error: true

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check & build
        run: npm run build
